<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha — SISENG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #2d5282 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .logo i { font-size: 1.6rem; color: #f97316; }
    .logo span { font-size: 1.5rem; font-weight: 900; color: #0f172a; letter-spacing: -1px; }
    .logo strong { color: #f97316; }

    .card-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .card-icon i { font-size: 1.6rem; color: #2563eb; }

    h1 { font-size: 1.4rem; font-weight: 800; color: #0f172a; text-align: center; margin-bottom: 8px; }
    .subtitle { font-size: .9rem; color: #64748b; text-align: center; margin-bottom: 28px; line-height: 1.5; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: .9rem;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      color: #0f172a;
      outline: none;
      transition: .2s;
    }
    .input-wrap input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

    .toggle-pass {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #94a3b8;
      font-size: .9rem; padding: 4px;
    }
    .toggle-pass:hover { color: #2563eb; }

    /* Indicador de força da senha */
    .strength-wrap { margin-top: 8px; }
    .strength-bar {
      height: 4px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .strength-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .3s ease, background .3s ease;
      width: 0%;
    }
    .strength-label { font-size: .75rem; font-weight: 600; color: #94a3b8; }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: .25s ease;
      box-shadow: 0 6px 20px rgba(249,115,22,.4);
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(249,115,22,.5); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .alert.success { background: #f0fdf4; border: 1.5px solid #86efac; color: #166534; display: flex; }
    .alert.error   { background: #fef2f2; border: 1.5px solid #fca5a5; color: #991b1b; display: flex; }

    .back-link {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 24px;
      font-size: .85rem; color: #64748b;
      text-decoration: none; font-weight: 500;
      transition: color .2s;
    }
    .back-link:hover { color: #2563eb; }

    /* Estado de sucesso */
    .success-state { display: none; text-align: center; }
    .success-state .success-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .success-state .success-icon i { font-size: 2rem; color: #16a34a; }
    .success-state h2 { font-size: 1.3rem; font-weight: 800; color: #0f172a; margin-bottom: 8px; }
    .success-state p { font-size: .9rem; color: #64748b; margin-bottom: 24px; line-height: 1.6; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo">
    <i class="fas fa-hard-hat"></i>
    <span>SIS<strong>ENG</strong></span>
  </div>

  <!-- Formulário -->
  <div id="formState">
    <div class="card-icon">
      <i class="fas fa-lock"></i>
    </div>
    <h1>Redefinir senha</h1>
    <p class="subtitle">Digite sua nova senha abaixo.<br/>Ela deve ter no mínimo 8 caracteres.</p>

    <div class="alert" id="alertBox">
      <i class="fas fa-exclamation-circle"></i>
      <span id="alertMsg"></span>
    </div>

    <form id="resetForm" onsubmit="handleReset(event)">
      <div class="form-group">
        <label>Nova senha</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="novaSenha" placeholder="Mínimo 8 caracteres"
            oninput="checkStrength(this.value)" required />
          <button type="button" class="toggle-pass" onclick="togglePass('novaSenha', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-label" id="strengthLabel">Digite uma senha</span>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmar senha</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="confirmSenha" placeholder="Repita a senha" required />
          <button type="button" class="toggle-pass" onclick="togglePass('confirmSenha', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn" id="btnReset">
        <i class="fas fa-check"></i> Redefinir senha
      </button>
    </form>

    <a href="../index.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Voltar para o login
    </a>
  </div>

  <!-- Estado de sucesso -->
  <div class="success-state" id="successState">
    <div class="success-icon"><i class="fas fa-check"></i></div>
    <h2>Senha redefinida!</h2>
    <p>Sua senha foi alterada com sucesso. Você já pode fazer login com a nova senha.</p>
    <a href="../index.html" class="btn" style="text-decoration:none">
      <i class="fas fa-sign-in-alt"></i> Ir para o login
    </a>
  </div>

</div>

<script>
  /* ── Pega token da URL ── */
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    showAlert('Link inválido ou expirado. Solicite um novo.', 'error');
    document.getElementById('btnReset').disabled = true;
  }

  /* ── Força da senha ── */
  function checkStrength(val) {
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { pct: '0%',   color: '#e2e8f0', text: 'Digite uma senha' },
      { pct: '25%',  color: '#ef4444', text: 'Muito fraca' },
      { pct: '50%',  color: '#f59e0b', text: 'Fraca' },
      { pct: '75%',  color: '#3b82f6', text: 'Boa' },
      { pct: '90%',  color: '#22c55e', text: 'Forte' },
      { pct: '100%', color: '#16a34a', text: 'Muito forte' },
    ];
    const l = levels[Math.min(score, 5)];
    fill.style.width = l.pct;
    fill.style.background = l.color;
    label.textContent = l.text;
    label.style.color = l.color === '#e2e8f0' ? '#94a3b8' : l.color;
  }

  /* ── Toggle visibilidade ── */
  function togglePass(id, btn) {
    const input = document.getElementById(id);
    const isPass = input.type === 'password';
    input.type = isPass ? 'text' : 'password';
    btn.querySelector('i').className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
  }

  /* ── Alert ── */
  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    const msgEl = document.getElementById('alertMsg');
    box.className = `alert ${type}`;
    msgEl.textContent = msg;
  }

  /* ── Submit ── */
  async function handleReset(e) {
    e.preventDefault();
    const nova    = document.getElementById('novaSenha').value;
    const confirm = document.getElementById('confirmSenha').value;
    const btn     = document.getElementById('btnReset');

    if (nova.length < 8) {
      showAlert('A senha deve ter pelo menos 8 caracteres.', 'error');
      return;
    }
    if (nova !== confirm) {
      showAlert('As senhas não coincidem.', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redefinindo...';

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: nova }),
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('formState').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
      } else {
        showAlert(data.message || 'Erro ao redefinir senha.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Redefinir senha';
      }
    } catch {
      showAlert('Erro de conexão. Tente novamente.', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check"></i> Redefinir senha';
    }
  }
</script>

</body>
</html>
